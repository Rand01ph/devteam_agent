<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTeam Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-indigo-600 text-white px-4 py-3 flex items-center justify-between shadow-md">
        <h1 class="text-xl font-semibold">DevTeam Agent</h1>
        <div class="flex gap-2">
            <button id="btn-new-session" class="px-3 py-1 bg-indigo-500 hover:bg-indigo-400 rounded text-sm">
                新对话
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-3 border-b border-gray-200">
                <h2 class="text-sm font-medium text-gray-600">周报列表</h2>
            </div>
            <div id="report-list" class="flex-1 overflow-y-auto">
                <!-- Report list will be populated here -->
            </div>
            <div class="p-3 border-t border-gray-200">
                <button id="btn-back-chat" class="w-full px-3 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-500 text-sm hidden">
                    ← 返回对话
                </button>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="flex-1 flex flex-col min-h-0">
            <!-- Chat View -->
            <div id="chat-view" class="flex-1 flex flex-col min-h-0">
                <!-- Messages -->
                <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 min-h-0">
                    <div class="text-center text-gray-500 py-8">
                        <p class="text-lg">欢迎使用 DevTeam Agent</p>
                        <p class="text-sm mt-2">输入消息开始对话，或点击左侧查看周报</p>
                    </div>
                </div>

                <!-- Status Bar -->
                <div id="status-bar" class="px-4 py-2 bg-gray-50 border-t border-gray-200 text-sm text-gray-500 hidden flex-shrink-0">
                    <span id="status-text"></span>
                </div>

                <!-- Input Area -->
                <div class="p-4 border-t border-gray-200 bg-white flex-shrink-0">
                    <div class="flex gap-2">
                        <textarea
                            id="message-input"
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            rows="2"
                            placeholder="输入消息..."
                        ></textarea>
                        <div class="flex flex-col gap-2">
                            <button id="btn-send" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500">
                                发送
                            </button>
                            <button id="btn-interrupt" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-400 hidden">
                                中断
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Report View -->
            <div id="report-view" class="flex-1 flex flex-col min-h-0 hidden">
                <div class="px-4 py-3 bg-white border-b border-gray-200 flex items-center justify-between flex-shrink-0">
                    <h2 id="report-title" class="font-medium text-gray-800"></h2>
                    <button id="btn-close-report" class="text-gray-500 hover:text-gray-700">
                        ✕ 关闭
                    </button>
                </div>
                <div id="report-content" class="flex-1 overflow-y-auto p-6 bg-white prose prose-sm max-w-none min-h-0">
                    <!-- Report content will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
